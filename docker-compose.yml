version: "3.8"

# SourceDesk Docker Compose
#
# Default: PostgreSQL + Hindsight memory service.
# For a lightweight SQLite-only setup, see the comments in the web service
# environment block and remove the 'db' and 'hindsight' services.
#
# Quick start:
#   docker-compose up -d --build
#   docker-compose exec web node scripts/generate_api_token.js --user you@example.com

services:
  web:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      PORT: 3000
      # PostgreSQL (default — requires the 'db' service below)
      DATABASE_URL: "postgres://sourcedesk:sourcedeskpass@db:5432/sourcedesk"
      # SQLite alternative (remove 'db' + 'hindsight' services and use this instead):
      # DATABASE_URL: "sqlite:./data/sourcedesk.db"

      # Server-side LLM for email summarization
      LLM_PROVIDER: "${LLM_PROVIDER:-anthropic}"
      LLM_MODEL: "${LLM_MODEL:-claude-sonnet-4-6}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"

      # Local LLM (injected into the browser app)
      LOCAL_LLM_URL: "${LOCAL_LLM_URL:-http://localhost:11434/v1}"
      LOCAL_LLM_DEFAULT_MODEL: "${LOCAL_LLM_DEFAULT_MODEL:-}"

      # Hindsight memory service
      HINDSIGHT_API_URL: "http://hindsight:8888"
      # Note: HINDSIGHT_API_LLM_API_KEY and HINDSIGHT_API_EMBEDDINGS_API_KEY for the
      # hindsight service are driven by HINDSIGHT_LLM_API_KEY / HINDSIGHT_EMBEDDINGS_API_KEY
      # in your .env. They are NOT inherited from ANTHROPIC_API_KEY / OPENAI_API_KEY here.
    volumes:
      # SQLite database persistence (unused when PostgreSQL is active, but harmless)
      - data:/app/data
      # API tokens and email ingest files
      - ./.private-documents:/app/.private-documents
      # Server-side backups
      - ./backups:/app/backups
    depends_on:
      db:
        condition: service_healthy

  # ─── PostgreSQL service ───────────────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16 # pgvector included for future RAG/embedding support
    restart: unless-stopped
    environment:
      POSTGRES_USER: sourcedesk
      POSTGRES_PASSWORD: sourcedeskpass
      POSTGRES_DB: sourcedesk
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sourcedesk"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Hindsight memory service ─────────────────────────────────────────────────
  # Gives the AI persistent memory across sessions (chat, notes, SQ answers, etc.).
  # Uses the slim image (~500 MB) — delegates embeddings to your LLM provider.
  # Hindsight manages its OWN database (sourcedesk_hindsight) — separate from SourceDesk's.
  hindsight:
    image: ghcr.io/vectorize-io/hindsight:latest-slim
    restart: unless-stopped
    ports:
      - "8888:8888" # Hindsight API
      - "9999:9999" # Hindsight control plane (optional)
    environment:
      # LLM for fact extraction — defaults to Anthropic Haiku
      # To use a local LLM (Ollama/LM Studio), set in .env:
      #   HINDSIGHT_LLM_PROVIDER=openai  (OpenAI-compat)
      #   HINDSIGHT_LLM_API_KEY=ollama   (or any non-empty string)
      #   HINDSIGHT_LLM_MODEL=llama3.2   (or your loaded model name)
      #   HINDSIGHT_LLM_BASE_URL=http://host.docker.internal:11434/v1
      HINDSIGHT_API_LLM_PROVIDER: "${HINDSIGHT_LLM_PROVIDER:-anthropic}"
      HINDSIGHT_API_LLM_API_KEY: "${HINDSIGHT_LLM_API_KEY:-}"
      HINDSIGHT_API_LLM_MODEL: "${HINDSIGHT_LLM_MODEL:-claude-haiku-4-5-20251001}"
      HINDSIGHT_API_LLM_BASE_URL: "${HINDSIGHT_LLM_BASE_URL:-}"
      # Embeddings — defaults to OpenAI text-embedding-3-small
      # For local embeddings via Ollama: set HINDSIGHT_EMBEDDINGS_PROVIDER=openai,
      #   HINDSIGHT_EMBEDDINGS_MODEL=nomic-embed-text,
      #   HINDSIGHT_EMBEDDINGS_BASE_URL=http://host.docker.internal:11434/v1
      HINDSIGHT_API_EMBEDDINGS_PROVIDER: "${HINDSIGHT_EMBEDDINGS_PROVIDER:-openai}"
      HINDSIGHT_API_EMBEDDINGS_API_KEY: "${HINDSIGHT_EMBEDDINGS_API_KEY:-}"
      HINDSIGHT_API_EMBEDDINGS_MODEL: "${HINDSIGHT_EMBEDDINGS_MODEL:-text-embedding-3-small}"
      HINDSIGHT_API_EMBEDDINGS_BASE_URL: "${HINDSIGHT_EMBEDDINGS_BASE_URL:-}"
      # Hindsight's own database — MUST be a different DB name from SourceDesk
      HINDSIGHT_API_DATABASE_URL: postgresql://sourcedesk:sourcedeskpass@db:5432/sourcedesk_hindsight
    volumes:
      - hindsight_data:/home/hindsight/.pg0
    depends_on:
      db:
        condition: service_healthy

volumes:
  data:
  db_data:
  hindsight_data:
